services:
  portainer:
    image: portainer/portainer-ee:sts
    command: -H unix:///var/run/docker.sock
    restart: always
    environment:
      - TRUSTED_ORIGINS=portainer.jitendhull.tech
    ports:
      - 127.0.0.1:9001:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
