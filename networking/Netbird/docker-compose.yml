services:
  netbird-client:
      container_name: netbird-client
      hostname: main
      cap_add:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
      devices:
          # Required when using userspace mode or when kernel module is not available
          - /dev/net/tun
      network_mode: host
      environment:
          - NB_SETUP_KEY=A44A17C7-24C5-423F-98A7-28C079FB6957
          - NB_MANAGEMENT_URL=https://netbird.jitendhull.tech
          - NB_ADMIN_URL=https://netbird.jitendhull.tech
      volumes:
          - netbird-client:/var/lib/netbird
      image: netbirdio/netbird:latest
volumes:
  netbird-client:
      name: netbird-client
